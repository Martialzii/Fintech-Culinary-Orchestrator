<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KitchenLedger | Live Load Test</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .pulse-red { animation: pulse-red 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } }
        .glass-card { background: rgba(23, 31, 51, 0.7); backdrop-filter: blur(12px); border: 1px solid #3c4a42; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0b1326; }
        ::-webkit-scrollbar-thumb { background: #3c4a42; border-radius: 10px; }
</style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#10b981", "surface-dim": "#0b1326", "outline": "#86948a",
                        "primary": "#4edea3", "error-container": "#93000a", "secondary": "#ffb95f",
                        "on-surface": "#dae2fd", "surface-container-low": "#131b2e", "background": "#0b1326",
                        "error": "#ffb4ab", "surface-container-high": "#222a3d", "outline-variant": "#3c4a42"
                    },
                    "spacing": { "sm": "8px", "lg": "24px", "margin-mobile": "16px", "gutter": "12px", "md": "16px" }
                }
            }
        }
</script>
</head>
<body class="bg-background text-on-surface font-sans overflow-x-hidden pb-20">
<header class="sticky top-0 w-full z-40 bg-background border-b border-outline-variant flex justify-between items-center px-margin-mobile h-14">
    <div class="flex items-center gap-3">
        <span class="text-xl font-bold text-primary">Kitchen Orchestrator</span>
        <div class="flex items-center gap-2 px-2 py-1 bg-error-container/20 rounded-full border border-error/30">
            <span class="w-2 h-2 bg-error rounded-full pulse-red"></span>
            <span class="text-xs text-error uppercase tracking-widest font-bold">Stress Active</span>
        </div>
    </div>
</header>
<main class="p-margin-mobile space-y-gutter">
    <section class="grid grid-cols-2 gap-gutter">
        <div class="glass-card rounded-xl p-md flex flex-col items-center justify-center border-t-2 border-primary">
            <span class="text-xs text-slate-400 uppercase mb-1">Throughput</span>
            <div class="flex items-baseline gap-1"><span class="text-3xl font-bold text-primary" id="tx-count">850</span><span class="text-xs text-slate-400">tx/min</span></div>
        </div>
        <div class="glass-card rounded-xl p-md flex flex-col items-center justify-center border-t-2 border-secondary">
            <span class="text-xs text-slate-400 uppercase mb-1">Latency</span>
            <div class="flex items-baseline gap-1"><span class="text-3xl font-bold text-secondary" id="latency-val">42</span><span class="text-xs text-slate-400">ms</span></div>
        </div>
    </section>
    <section class="glass-card rounded-xl p-md space-y-md">
        <div class="flex justify-between items-center">
            <div>
                <h2 class="text-lg font-semibold">M-Pesa API Response Trace</h2>
                <p class="text-xs text-slate-400">Real-time Stress Matrix</p>
            </div>
            <span class="text-xs font-mono text-primary px-2 py-0.5 bg-primary/10 border border-primary/20 rounded">STABLE</span>
        </div>
        <div class="h-40 w-full flex items-end gap-[2px] bg-slate-950/50 p-2 rounded-lg" id="visualizer"></div>
    </section>
</main>
<script>
    const txElement = document.getElementById('tx-count');
    const latencyElement = document.getElementById('latency-val');
    const visualizer = document.getElementById('visualizer');
    for (let i = 0; i < 40; i++) {
        const bar = document.createElement('div');
        bar.className = 'flex-1 bg-primary/40 rounded-t-sm transition-all duration-300';
        bar.style.height = Math.random() * 80 + 20 + '%';
        visualizer.appendChild(bar);
    }
    setInterval(() => {
        txElement.innerText = Math.floor(840 + Math.random() * 25);
        latencyElement.innerText = Math.floor(38 + Math.random() * 10);
        for (let bar of visualizer.children) {
            bar.style.height = Math.random() * 70 + 20 + '%';
        }
    }, 800);
</script>
</body></html>
